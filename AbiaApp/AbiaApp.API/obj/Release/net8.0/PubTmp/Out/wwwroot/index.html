<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        // Verifica se tem usuário salvo. Se não tiver, manda pro login.
        const usuario = localStorage.getItem('usuario_logado');
        if (!usuario) {
            window.location.href = '/login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrechozeira AI</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

            .form-group label {
                display: block;
                font-size: 0.8rem;
                color: #666;
                margin-bottom: 5px;
                font-weight: bold;
            }

        .input-origem {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        #btnGravar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            font-size: 35px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 117, 252, 0.4);
            transition: transform 0.2s;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            #btnGravar:active {
                transform: scale(0.95);
            }

            #btnGravar.gravando {
                animation: pulsare 1.5s infinite;
                background: #ff4b2b;
            }

        @keyframes pulsare {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 75, 43, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(255, 75, 43, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 75, 43, 0);
            }
        }

        #status {
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
            min-height: 24px;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        /* Área de Sucesso */
        .resultado {
            text-align: left;
            background: #d4edda;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            border-left: 5px solid #28a745;
            position: relative;
        }

            .resultado h3 {
                margin: 0 0 10px 0;
                color: #155724;
                font-size: 1rem;
            }

        .btn-desfazer {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            float: right;
            font-size: 0.8rem;
        }

        /* Área de Exclusão Manual */
        .zona-perigo {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .btn-lixo {
            background: none;
            border: none;
            color: #999;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: underline;
        }

        .area-exclusao-manual {
            display: none;
            margin-top: 10px;
            background: #fff5f5;
            padding: 10px;
            border-radius: 8px;
        }

        .input-exclusao {
            padding: 5px;
            width: 60px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-confirmar-exclusao {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎙️ Cadastrar Peça</h1>

        <div class="form-group">
            <label for="inputOrigem">Origem do Lote:</label>
            <input list="listaOrigens" id="inputOrigem" class="input-origem" placeholder="Ex: Outlet, Bazar...">
            <datalist id="listaOrigens"></datalist>
        </div>

        <button id="btnGravar">
            <span id="iconeBtn">🎤</span>
        </button>

        <div id="status">Toque para iniciar</div>

        <div id="areaResultado" class="resultado">
            <button class="btn-desfazer" onclick="excluirUltimo()">🗑️ Desfazer</button>
            <h3>✅ Salvo! ID: <span id="resId"></span></h3>
            <p><strong><span id="resDesc"></span></strong></p>
            <p>R$ <span id="resPreco"></span> | <span id="resOrigem"></span></p>
        </div>

        <div class="zona-perigo">
            <button class="btn-lixo" onclick="toggleExclusao()">Opções de Exclusão</button>
            <div id="painelExclusao" class="area-exclusao-manual">
                <p style="margin:0 0 5px 0; font-size:0.8rem; color:#dc3545;">Excluir produto específico:</p>
                <input type="number" id="idParaExcluir" class="input-exclusao" placeholder="ID">
                <button class="btn-confirmar-exclusao" onclick="excluirManual()">Apagar</button>
            </div>
        </div>
        <button onclick="logout()" style="margin-top:20px; background:none; border:none; color:#666; cursor:pointer;">
            Sair / Logout
        </button>

        <script>
            // ... (seus outros scripts)
            function logout() {
                localStorage.removeItem('usuario_logado');
                window.location.href = '/login.html';
            }
        </script>
    </div>

    <script>
        const btn = document.getElementById('btnGravar');
        const iconeBtn = document.getElementById('iconeBtn');
        const statusDiv = document.getElementById('status');
        const resultadoDiv = document.getElementById('areaResultado');
        const inputOrigem = document.getElementById('inputOrigem');
        const dataList = document.getElementById('listaOrigens');
        const painelExclusao = document.getElementById('painelExclusao');

        btn.addEventListener('click', alternarGravacao);

        // --- SISTEMA DE SOM (Sintetizador) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function tocarSom(tipo) {
            // Reinicia o contexto se estiver suspenso (comum em browsers mobile)
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (tipo === 'sucesso') {
                // Som de "Ding" (Senoide, agudo, rápido)
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // Dó
                oscillator.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.1); // Sobe para Dó agudo
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else if (tipo === 'erro') {
                // Som de "Buzz" (Dente de serra, grave)
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3); // Cai a frequência
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        async function carregarOrigens() {
            try {
                const res = await fetch('/api/Agente/origens');
                const lista = await res.json();
                dataList.innerHTML = '';
                lista.forEach(item => {
                    if (item) {
                        let opt = document.createElement('option');
                        opt.value = item;
                        dataList.appendChild(opt);
                    }
                });
            } catch (e) { console.error(e); }
        }
        carregarOrigens();

        async function excluirUltimo() {
            if (!confirm("Tem certeza que deseja apagar o ÚLTIMO produto cadastrado?")) return;
            try {
                statusDiv.innerHTML = "⏳ Excluindo...";
                const res = await fetch('/api/Agente/excluir/ultimo', { method: 'DELETE' });
                if (res.ok) {
                    resultadoDiv.style.display = 'none';
                    statusDiv.innerHTML = "🗑️ Último produto apagado.";
                } else {
                    tocarSom('erro');
                    alert("Erro ao excluir.");
                }
            } catch (e) { alert(e.message); }
        }

        function toggleExclusao() {
            painelExclusao.style.display = painelExclusao.style.display === 'block' ? 'none' : 'block';
        }

        async function excluirManual() {
            const id = document.getElementById('idParaExcluir').value;
            if (!id) return alert("Digite um ID");
            if (!confirm(`Apagar produto ID ${id}?`)) return;

            try {
                const res = await fetch(`/api/Agente/excluir/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert("Produto apagado!");
                    document.getElementById('idParaExcluir').value = "";
                    toggleExclusao();
                } else {
                    tocarSom('erro');
                    alert("Erro: Produto não encontrado.");
                }
            } catch (e) { alert(e.message); }
        }

        // --- VOZ ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let estaGravando = false;
        let textoAcumulado = "";

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = function (event) {
                let textoTemporario = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        textoAcumulado += event.results[i][0].transcript + " ";
                    } else {
                        textoTemporario += event.results[i][0].transcript;
                    }
                }
                statusDiv.innerHTML = "🗣️ " + textoAcumulado + textoTemporario;
            };

            recognition.onerror = function (event) {
                if (event.error !== 'no-speech') {
                    pararGravacaoVisual();
                    tocarSom('erro'); // Som se der erro na voz
                    statusDiv.innerHTML = "Erro: " + event.error;
                }
            };
        } else {
            statusDiv.innerHTML = "❌ Sem suporte a voz.";
            btn.disabled = true;
        }

        function alternarGravacao() {
            if (!recognition) return;

            // Habilita áudio no primeiro clique (necessário para celulares)
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (estaGravando) {
                recognition.stop();
                pararGravacaoVisual();
                if (textoAcumulado.trim().length > 0) enviarParaAPI(textoAcumulado);
            } else {
                resultadoDiv.style.display = 'none';
                textoAcumulado = "";
                estaGravando = true;
                btn.classList.add('gravando');
                iconeBtn.innerText = "⬛";
                statusDiv.innerHTML = "Ouvindo...";
                recognition.start();
            }
        }

        function pararGravacaoVisual() {
            estaGravando = false;
            btn.classList.remove('gravando');
            iconeBtn.innerText = "🎤";
            statusDiv.innerHTML = "Processando...";
        }

        async function enviarParaAPI(textoFalado) {
            statusDiv.innerHTML = "🧠 Inteligência trabalhando...";
            try {
                const origem = inputOrigem.value;
                const response = await fetch('/api/Agente/cadastrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ textoUsuario: textoFalado, origemFixa: origem })
                });

                if (!response.ok) throw new Error(await response.text());
                const json = await response.json();

                // --- SUCESSO! ---
                tocarSom('sucesso'); // <--- TOCA O SOM AQUI

                statusDiv.innerHTML = "Pronto!";
                document.getElementById('resId').innerText = json.id;
                document.getElementById('resDesc').innerText = json.dados.descricao;
                document.getElementById('resPreco').innerText = json.dados.precoVenda;
                document.getElementById('resOrigem').innerText = json.dados.origem;
                resultadoDiv.style.display = 'block';

                if (origem) setTimeout(carregarOrigens, 1000);

            } catch (err) {
                // --- ERRO! ---
                tocarSom('erro'); // <--- TOCA O SOM AQUI
                statusDiv.innerHTML = "❌ " + err.message;
            }
        }
    </script>
</body>
</html>
