<div class="app-card shadow-1">
  <div class="app-card__header" [ngClass]="{
    'app-card--primary': variant === 'primary',
    'app-card--accent': variant === 'accent',
    'app-card--warn': variant === 'warn'
  }">
    <div class="app-card__title">{{ title }}</div>
  </div>
  <div class="app-card__body">
    <ng-content></ng-content>
  </div>
</div>
