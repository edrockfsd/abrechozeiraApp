<div class="app-shell" *ngIf="!isAuthRoute; else authOnly">
  <aside class="sidebar" [class.collapsed]="isCollapsed" *ngIf="isAuthenticated">
    <div class="brand" title="Abcz">
      <ng-container *ngIf="!isCollapsed; else collapsedBrand">
        <span class="brand-text">Abcz</span>
      </ng-container>
      <ng-template #collapsedBrand>
        <span class="material-icons brand-icon">checkroom</span>
      </ng-template>
    </div>
    <nav class="menu">
      <ng-container *ngFor="let item of menu">
        <a *ngIf="isVisible(item)"
           [routerLink]="item.route"
           routerLinkActive="active"
           class="menu-item">
          <span class="icon material-icons">{{ item.icon }}</span>
          <span class="label">{{ item.label }}</span>
        </a>
      </ng-container>
    </nav>
    <div class="sidebar-footer">
      <div class="user" *ngIf="userName">{{ userName }}</div>
      <button class="logout" (click)="onLogout()">Sair</button>
    </div>
  </aside>

  <main class="content">
    <header class="topbar md-toolbar">
      <div class="left">
        <button class="icon-btn" title="Menu" (click)="toggleSidebar()" aria-label="Alternar menu">
          <span class="material-icons">menu</span>
        </button>
        <div class="title">Painel</div>
      </div>
      <div class="actions">
        <button class="icon-btn" title="Tema" (click)="toggleTheme()">
          <span class="material-icons">{{ isDark ? 'light_mode' : 'dark_mode' }}</span>
        </button>
        <button class="logout" *ngIf="isAuthenticated" (click)="onLogout()">Sair</button>
      </div>
    </header>
    <section class="page">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

<ng-template #authOnly>
  <router-outlet></router-outlet>
  <!-- Sem shell na página de autenticação -->
  <!-- Poderíamos mostrar branding básico aqui se desejar -->
  
</ng-template>
