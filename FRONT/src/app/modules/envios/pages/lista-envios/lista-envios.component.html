<div class="lista-container">
  <ejs-toast #toast
             [position]="toastSettings.position"
             [showCloseButton]="toastSettings.showCloseButton"
             [timeOut]="toastSettings.timeOut">
  </ejs-toast>

  <!-- Header -->
  <div class="header">
    <div class="header-content">
      <div class="header-left">
        <div class="header-icon">
          <span class="material-icons">local_shipping</span>
        </div>
        <div>
          <h1>Envios — Superfrete</h1>
          <p class="header-subtitle">Gerencie suas etiquetas de envio</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-refresh" style="border-color: #00b894; color: #00b894;" (click)="onVerificarStatusSelecionados()" [disabled]="verificandoStatus" title="Sincronizar status com InfinitePay e Superfrete">
          <span class="material-icons">{{ verificandoStatus ? 'hourglass_empty' : 'sync' }}</span>
          <span>Atualizar Status</span>
        </button>
        <button class="btn-refresh" style="border-color: #0984e3; color: #0984e3;" (click)="onEnviarRastreiosSelecionados()" [disabled]="enviandoRastreiosLote" title="Enviar rastreios por e-mail para os itens selecionados">
          <span class="material-icons">{{ enviandoRastreiosLote ? 'hourglass_empty' : 'forward_to_inbox' }}</span>
          <span>Enviar Rastreios</span>
        </button>
        <div class="divider" style="width: 1px; height: 32px; background-color: #e0e0e0; margin: 0 8px;"></div>
        <button class="btn-refresh" (click)="carregarEtiquetasEMapeamentos()" title="Atualizar lista">
          <span class="material-icons">refresh</span>
          <span>Atualizar</span>
        </button>
        <button class="btn-refresh" style="border-color: #6c5ce7; color: #6c5ce7;" (click)="onImportarWhatsApp()" title="Importar envios do WhatsApp">
          <span class="material-icons">upload_file</span>
          <span>Importar WhatsApp</span>
        </button>
        <button ejs-button cssClass="e-primary" (click)="onNovoPedido()">
          <span class="e-btn-icon e-add e-icons e-icon-left"></span>
          Novo Pedido
        </button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" *ngIf="carregando">
    <div class="loading-spinner">
      <span class="material-icons spin">autorenew</span>
      <span>Carregando etiquetas...</span>
    </div>
  </div>

  <!-- Filtros -->
  <div class="filter-panel" *ngIf="!carregando">
    <div class="filter-group">
      <div class="filter-field">
        <label for="filtroStatus">Status</label>
        <select id="filtroStatus" class="filter-select" [(ngModel)]="filtroStatus" (change)="filtrarDados()">
          <option value="all">Todos os Status</option>
          <option value="pending">Aguardando Pagamento</option>
          <option value="released">Aguardando Postagem</option>
          <option value="posted">Postado</option>
          <option value="delivered">Entregue</option>
          <option value="cancelled">Cancelado</option>
        </select>
      </div>

      <div class="filter-field">
        <label for="dataInicio">Data Inicial</label>
        <input id="dataInicio" type="date" class="filter-input" [(ngModel)]="filtroDataInicio" (change)="filtrarDados()">
      </div>

      <div class="filter-field">
        <label for="dataFim">Data Final</label>
        <input id="dataFim" type="date" class="filter-input" [(ngModel)]="filtroDataFim" (change)="filtrarDados()">
      </div>

      <div class="filter-actions">
        <button class="btn-clear-filters" (click)="limparFiltros()" [disabled]="filtroStatus === 'all' && !filtroDataInicio && !filtroDataFim" title="Limpar Filtros">
          <span class="material-icons">filter_alt_off</span>
          <span>Limpar</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid-card shadow-sm" *ngIf="!carregando">
    <ejs-grid
      #grid
      [dataSource]="data"
      [allowPaging]="true"
      [allowSorting]="true"
      [allowFiltering]="true"
      [pageSettings]="gridSettings.pageSettings"
      [toolbar]="gridSettings.toolbar"
      [searchSettings]="gridSettings.searchSettings"
      width="100%">
      <e-columns>
        <e-column type="checkbox" width="50"></e-column>
        <e-column field="id" headerText="ID Etiqueta" width="220"></e-column>
        <e-column field="protocol" headerText="Protocolo" width="140"></e-column>
        <e-column field="destinatario" headerText="Destinatário" width="200"></e-column>
        <e-column field="service_name" headerText="Serviço" width="140"></e-column>
        <e-column field="tracking" headerText="Rastreio" width="180"></e-column>
        <e-column field="price" headerText="Valor" width="120" format="C2"></e-column>
        <e-column field="statusPagamento" headerText="Pgto (Loja)" width="150">
          <ng-template #template let-data>
            <span class="badge" 
                  [ngClass]="data.statusPagamento === 'Pago' ? 'badge-delivered' : 'badge-pending'">
              {{ data.statusPagamento }}
            </span>
          </ng-template>
        </e-column>
        <e-column field="statusLabel" headerText="Status (Superfrete)" width="180">
          <ng-template #template let-data>
            <span class="badge" [ngClass]="getStatusClass(data.status)">
              {{ data.statusLabel }}
            </span>
          </ng-template>
        </e-column>
        <e-column field="created_at" headerText="Data Criação" width="160"></e-column>
        <e-column headerText="Ações / Notificações" width="220" textAlign="Center">
          <ng-template #template let-data>
            <div class="actions-container" style="display: flex; gap: 8px; justify-content: center;">
              
              <!-- Cotação -->
              <div class="action-group" style="display: flex; flex-direction: column; align-items: center; gap: 4px;" *ngIf="data.transacaoId && data.statusPagamento === 'Aguardando'">
                <div style="font-size: 10px; color: #888;">Cotação</div>
                <div style="display: flex; gap: 4px;">
                  <!-- E-mail Cotação -->
                  <button class="btn-icon" [ngClass]="{'sent': data.emailCotacaoEnviado}" (click)="onReenviarCotacao(data)" title="Reenviar E-mail Cotação">
                    <span class="material-icons" style="font-size: 18px;">mail</span>
                  </button>
                  <!-- WhatsApp Cotação -->
                  <button class="btn-icon" [ngClass]="{'sent': data.whatsAppCotacaoEnviado}" (click)="onEnviarWhatsApp(data, 'cotacao')" title="Enviar WhatsApp Cotação">
                    <span class="material-icons" style="font-size: 18px; color: #25D366;">chat</span>
                  </button>
                </div>
              </div>

              <!-- Rastreio -->
              <div class="action-group" style="display: flex; flex-direction: column; align-items: center; gap: 4px;" *ngIf="data.statusPagamento === 'Pago' || data.statusLabel === 'Postado'">
                <div style="font-size: 10px; color: #888;">Rastreio</div>
                <div style="display: flex; gap: 4px;">
                  <!-- WhatsApp Rastreio -->
                  <button class="btn-icon" [ngClass]="{'sent': data.whatsAppRastreioEnviado}" (click)="onEnviarWhatsApp(data, 'rastreio')" title="Enviar WhatsApp Rastreio">
                    <span class="material-icons" style="font-size: 18px; color: #25D366;">chat</span>
                  </button>
                </div>
              </div>

            </div>
          </ng-template>
        </e-column>
      </e-columns>
    </ejs-grid>
  </div>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="!carregando && data.length === 0">
    <span class="material-icons empty-icon">inventory</span>
    <h3>Nenhuma etiqueta gerada</h3>
    <p>Gere sua primeira etiqueta abrindo um pedido e usando o painel de <strong>Envio / Frete</strong>.</p>
  </div>
</div>
