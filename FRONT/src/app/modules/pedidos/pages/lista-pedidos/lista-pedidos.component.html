<div class="lista-container">
  <ejs-toast #toast 
             [position]="toastSettings.position" 
             [showCloseButton]="toastSettings.showCloseButton"
             [timeOut]="toastSettings.timeOut">
  </ejs-toast>

  <div class="header">
    <div class="header-content">
      <h1>Pedidos</h1>
      <button ejs-button cssClass="e-primary" (click)="onNovoPedido()">
        <span class="e-btn-icon e-add e-icons e-icon-left"></span>
        Novo Pedido
      </button>
    </div>
  </div>

  <div class="grid-container">
    <div class="loading-indicator" *ngIf="carregando">
      <i class="e-icons e-spinner e-spin"></i>
      <span>Carregando pedidos...</span>
    </div>

    <ejs-grid
      #grid
      [dataSource]="data"
      [allowPaging]="true"
      [pageSettings]="gridSettings.pageSettings"
      [toolbar]="gridSettings.toolbar"
      [searchSettings]="gridSettings.searchSettings"
      [allowSorting]="true"
      [allowFiltering]="true"
      >
      <e-columns>
        <e-column headerText="Ações" width="120">
          <ng-template #template let-data>
            <div class="action-buttons" style="display: flex; gap: 8px;">
              <button ejs-button cssClass="e-small e-flat" (click)="onEditar(data)" title="Editar">
                <span class="material-icons" style="font-size: 18px;">edit</span>
              </button>
              <button ejs-button cssClass="e-small e-flat e-danger" (click)="onExcluir(data)" title="Excluir">
                <span class="material-icons" style="font-size: 18px;">delete</span>
              </button>
            </div>
          </ng-template>
        </e-column>
        <e-column 
          *ngFor="let col of gridSettings.columns"
          [field]="col.field"
          [headerText]="col.headerText"
          [width]="col.width"
          [textAlign]="col.textAlign"
          [format]="col.format"
          [visible]="col.visible">
        </e-column>
      </e-columns>
    </ejs-grid>
  </div>
</div>
